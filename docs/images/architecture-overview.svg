<svg width="1400" height="880" viewBox="0 0 1400 880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TradeAgent architecture overview</title>
  <desc id="desc">Diagram showing frontend surfaces, FastAPI application layer, external dependencies, runtime trading engine, Strategy Studio research flow, and SQLite persistence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111A33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172443"/>
      <stop offset="1" stop-color="#121B31"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#132A3B"/>
      <stop offset="1" stop-color="#101F2B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020611" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#75A7FF"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F4F7FF; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #9FB4DF; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F4F7FF; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #EAF0FF; }
      .body { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #AFC0E8; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #85F3C7; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #DCE7FF; }
      .note { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #8DA1CC; }
    </style>
  </defs>

  <rect width="1400" height="880" rx="28" fill="url(#bg)"/>

  <text x="52" y="64" class="title">TradeAgent Architecture</text>
  <text x="52" y="92" class="subtitle">Current consolidated stack: paper-trading runtime engine, Strategy Studio research flow, and SQLite-backed operator memory.</text>

  <rect x="52" y="106" width="112" height="28" rx="14" fill="#17325A" stroke="#315B96"/>
  <text x="74" y="124" class="pill">Paper-only</text>
  <rect x="178" y="106" width="154" height="28" rx="14" fill="#17325A" stroke="#315B96"/>
  <text x="199" y="124" class="pill">V2 runtime engine</text>
  <rect x="346" y="106" width="166" height="28" rx="14" fill="#143648" stroke="#2A6C88"/>
  <text x="369" y="124" class="pill">Strategy Studio</text>
  <rect x="526" y="106" width="162" height="28" rx="14" fill="#17325A" stroke="#315B96"/>
  <text x="549" y="124" class="pill">SQLite memory</text>

  <rect x="42" y="146" width="392" height="246" rx="24" fill="url(#panel)" stroke="#28406B" filter="url(#shadow)"/>
  <text x="68" y="170" class="section">Frontend Surfaces</text>
  <text x="68" y="198" class="body">React + Vite + TypeScript UI</text>

  <rect x="68" y="222" width="154" height="58" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="86" y="255" class="label">Dashboard</text>
  <text x="86" y="273" class="body">execution context</text>

  <rect x="244" y="222" width="154" height="58" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="262" y="255" class="label">Workbench</text>
  <text x="262" y="273" class="body">operator controls</text>

  <rect x="68" y="298" width="154" height="58" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="86" y="331" class="label">Strategy Studio</text>
  <text x="86" y="349" class="body">AI research flow</text>

  <rect x="244" y="298" width="154" height="58" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="262" y="331" class="label">Checklist</text>
  <text x="262" y="349" class="body">macro decision aid</text>

  <rect x="488" y="146" width="430" height="246" rx="24" fill="url(#panel)" stroke="#28406B" filter="url(#shadow)"/>
  <text x="514" y="170" class="section">FastAPI Application Layer</text>
  <text x="514" y="198" class="body">Single consolidated API under /api</text>

  <rect x="514" y="224" width="168" height="56" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="535" y="257" class="label">app.py</text>
  <text x="535" y="275" class="body">entrypoint</text>

  <rect x="700" y="224" width="192" height="56" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="721" y="257" class="label">app_bootstrap.py</text>
  <text x="721" y="275" class="body">startup + warmup</text>

  <rect x="514" y="300" width="378" height="56" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="536" y="333" class="label">api/router.py</text>
  <text x="536" y="351" class="body">health, config, market, engine, paper history, checklist, studio</text>

  <rect x="964" y="146" width="394" height="246" rx="24" fill="url(#panel2)" stroke="#24536A" filter="url(#shadow)"/>
  <text x="990" y="170" class="section">External Dependencies</text>
  <text x="990" y="198" class="body">Optional at boot depending on environment flags</text>

  <rect x="990" y="222" width="160" height="62" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="1014" y="256" class="label">cTrader Adapter</text>
  <text x="1014" y="275" class="body">transport + symbols</text>

  <rect x="1172" y="222" width="160" height="62" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="1207" y="256" class="label">LLM Provider</text>
  <text x="1207" y="275" class="body">Ollama or Gemini</text>

  <rect x="990" y="304" width="342" height="50" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="1012" y="335" class="body">Broker transport, market data, and model warmup feed the backend</text>

  <rect x="42" y="434" width="646" height="316" rx="24" fill="url(#panel)" stroke="#28406B" filter="url(#shadow)"/>
  <text x="68" y="474" class="section">Runtime Trading Engine</text>
  <text x="68" y="502" class="body">Paper-only V2 loop with explicit role separation inside services</text>

  <rect x="68" y="532" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="93" y="567" class="label">engine.py</text>
  <text x="93" y="586" class="body">loop coordinator</text>

  <rect x="244" y="532" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="262" y="567" class="label">market_data.py</text>
  <text x="262" y="586" class="body">bars + freshness</text>

  <rect x="420" y="532" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="434" y="567" class="label">strategies/registry.py</text>
  <text x="434" y="586" class="body">deterministic signals</text>

  <rect x="68" y="624" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="86" y="659" class="label">risk_engine.py</text>
  <text x="86" y="678" class="body">accept / reject</text>

  <rect x="244" y="624" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="258" y="659" class="label">execution_engine.py</text>
  <text x="258" y="678" class="body">intents + paper trades</text>

  <rect x="420" y="624" width="154" height="66" rx="14" fill="#1B2D53" stroke="#35538D"/>
  <text x="441" y="659" class="label">reconciler.py</text>
  <text x="441" y="678" class="body">recover + reconcile</text>

  <text x="68" y="724" class="chip">Conceptual roles:</text>
  <text x="180" y="724" class="body">coordinator, market observer, strategy analyst, risk guardian, executor, recovery layer</text>

  <rect x="730" y="434" width="628" height="316" rx="24" fill="url(#panel2)" stroke="#24536A" filter="url(#shadow)"/>
  <text x="756" y="474" class="section">Strategy Studio Research Flow</text>
  <text x="756" y="502" class="body">AI-assisted strategy drafting and backtesting, separate from autonomous runtime execution</text>

  <rect x="756" y="532" width="166" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="775" y="567" class="label">studio_tasks.py</text>
  <text x="775" y="586" class="body">task router</text>

  <rect x="944" y="532" width="166" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="969" y="567" class="label">studio_llm.py</text>
  <text x="969" y="586" class="body">LLM interface</text>

  <rect x="1132" y="532" width="190" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="1154" y="567" class="label">programmer_agent.py</text>
  <text x="1154" y="586" class="body">fallback generator</text>

  <rect x="756" y="624" width="166" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="774" y="659" class="label">backtesting_agent.py</text>
  <text x="774" y="678" class="body">draft backtests</text>

  <rect x="944" y="624" width="166" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="959" y="659" class="label">studio_backtests.py</text>
  <text x="959" y="678" class="body">saved strategy tests</text>

  <rect x="1132" y="624" width="190" height="66" rx="14" fill="#143043" stroke="#27637C"/>
  <text x="1149" y="659" class="label">strategies_generated/</text>
  <text x="1149" y="678" class="body">saved strategy files</text>

  <text x="756" y="724" class="chip">Boundary:</text>
  <text x="822" y="724" class="body">research tooling and drafting workflow, not the autonomous engine path</text>

  <rect x="488" y="780" width="432" height="60" rx="18" fill="#0E1730" stroke="#304B7F"/>
  <text x="512" y="808" class="section">Persistence Layer</text>
  <text x="512" y="829" class="body">SQLite stores config, runtime state, analyses, incidents, order intents, paper positions, paper events, trade audit, and cached market bars.</text>

  <path d="M434 268H476" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M918 268H952" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M704 392V416" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1006 392V416" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M576 750V770" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1042 750V770" stroke="#75A7FF" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="1118" y="816" class="note">Paper-only by design • live execution intentionally blocked</text>
</svg>
